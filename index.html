<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bulk Tracker V1</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0a0f1a;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px;max-width:500px;margin:0 auto}
  input,textarea,button{-webkit-appearance:none;font-family:'DM Sans',sans-serif}
  button{cursor:pointer;border:none}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:#0f172a}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}

  /* Header */
  .header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:1px solid #1e293b;padding:16px 14px 12px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .header-left .label{font-size:10px;font-family:'DM Mono',monospace;color:#f97316;letter-spacing:3px;text-transform:uppercase}
  .header-left h1{font-size:20px;font-weight:700;letter-spacing:-0.5px;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:10px}
  .kcal-display{text-align:right}
  .kcal-display .num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
  .kcal-display .unit{font-size:10px;color:#64748b;margin-top:1px}
  .icon-btn{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:8px 10px;color:#94a3b8;font-size:16px}

  /* Day tabs */
  .day-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
  .day-tab{padding:8px 14px;border-radius:20px;border:none;font-size:12px;font-family:'DM Mono',monospace;font-weight:600;white-space:nowrap;transition:all 0.2s}
  .day-tab.active{background:#f97316;color:#fff}
  .day-tab.inactive{background:#1e293b;color:#64748b}

  /* Main content */
  .content{padding:14px}

  /* Cards */
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:16px;overflow:hidden;margin-bottom:14px}
  .card-header{padding:14px 16px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center}
  .card-header h2{font-size:14px;font-weight:700}

  /* Macro bars */
  .macro-bars{padding:16px}
  .macro-bar{margin-bottom:12px}
  .macro-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
  .macro-bar-label .name{font-weight:700;color:#e2e8f0;text-transform:uppercase;letter-spacing:1px}
  .macro-bar-label .value{font-family:'DM Mono',monospace}
  .macro-bar-track{background:#1e293b;border-radius:6px;height:10px;overflow:hidden}
  .macro-bar-fill{height:100%;border-radius:6px;transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1)}

  /* Summary grid */
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;border-top:1px solid #1e293b}
  .summary-box{background:#1e293b;border-radius:10px;padding:12px 14px}
  .summary-box .slabel{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .summary-box .sval{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}

  /* Tabs */
  .tabs{display:flex;gap:6px;padding:8px;background:#111827;border-bottom:1px solid #1e293b}
  .tab-btn{flex:1;padding:12px 6px;border:none;border-radius:10px;font-size:12px;font-weight:700;transition:all 0.2s}
  .tab-btn.active{background:#f97316;color:#fff}
  .tab-btn.inactive{background:transparent;color:#64748b}

  /* Favorites */
  .fav-item{padding:14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:10px}
  .fav-item:last-child{border-bottom:none}
  .fav-emoji{font-size:24px;flex-shrink:0}
  .fav-info{flex:1;min-width:0}
  .fav-name{font-weight:600;font-size:14px;margin-bottom:6px;line-height:1.3}
  .fav-macros{display:flex;gap:6px;flex-wrap:wrap}
  .fav-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .add-btn{background:#22c55e;border-radius:10px;width:44px;height:44px;color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .del-btn{background:transparent;border:1px solid #334155;border-radius:10px;width:44px;height:32px;color:#64748b;font-size:12px}

  /* Macro chip */
  .chip{text-align:center;background:#0a0f1a;border-radius:8px;padding:5px 6px;min-width:52px}
  .chip .cv{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
  .chip .cl{font-size:10px;color:#64748b;margin-top:1px}

  /* Search */
  .search-area{padding:14px}
  .search-row{display:flex;gap:8px;margin-bottom:12px}
  .search-input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;color:#e2e8f0;font-size:16px;outline:none}
  .search-input::placeholder{color:#475569}
  .search-btn{background:#f97316;border-radius:12px;padding:14px 16px;color:#fff;font-size:20px;font-weight:700;flex-shrink:0}
  .search-btn:disabled{background:#334155}

  /* Preview card */
  .preview-card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155;margin-bottom:12px}
  .preview-name{font-weight:700;font-size:15px;margin-bottom:4px}
  .preview-note{font-size:12px;color:#64748b;margin-bottom:10px}
  .preview-macros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .preview-actions{display:flex;gap:8px}
  .btn{border:none;border-radius:10px;font-weight:700;font-size:15px;padding:14px 16px;font-family:'DM Sans',sans-serif}
  .btn-green{background:#22c55e;color:#fff;flex:1}
  .btn-blue{background:#1d3a5f;border:1px solid #3b82f6;color:#93c5fd;flex:1}
  .btn-gray{background:#334155;color:#94a3b8;padding:14px}

  /* Time picker in preview */
  .time-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .time-label{font-size:12px;color:#64748b;white-space:nowrap}
  .time-input{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 10px;color:#e2e8f0;font-size:14px;font-family:'DM Mono',monospace;outline:none;width:110px}

  /* Log entries */
  .log-entry{padding:14px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .log-entry:last-child{border-bottom:none}
  .log-info{flex:1;min-width:0}
  .log-time{font-size:11px;color:#f97316;font-family:'DM Mono',monospace;margin-bottom:3px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  .log-name{font-weight:600;font-size:14px;margin-bottom:5px;line-height:1.3}
  .log-macros{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-family:'DM Mono',monospace}
  .log-controls{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-top:2px}
  .ctrl-btn{border-radius:10px;width:40px;height:40px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;border:none}
  .ctrl-minus{background:#2a1a1a;border:1px solid #7f1d1d !important;color:#f87171}
  .ctrl-plus{background:#1e3a2f;border:1px solid #22c55e !important;color:#22c55e}
  .ctrl-count{min-width:28px;text-align:center;font-family:'DM Mono',monospace;font-weight:700;font-size:18px}
  .log-total{padding:14px;background:#111827;border-top:2px solid #1e293b;display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:13px}

  /* Check-in */
  .checkin-area{padding:14px}
  .checkin-row{margin-bottom:16px}
  .checkin-label{font-size:13px;color:#94a3b8;margin-bottom:8px;font-weight:600}
  .scale-row{display:flex;gap:8px}
  .scale-btn{flex:1;padding:12px 4px;border-radius:10px;font-size:20px;border:2px solid transparent;background:#1e293b;transition:all 0.2s}
  .scale-btn.selected{border-color:#f97316;background:#2a1a0a}
  .notes-input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;color:#e2e8f0;font-size:14px;resize:none;outline:none;height:80px}
  .save-checkin{width:100%;background:#f97316;color:#fff;border-radius:10px;padding:14px;font-size:15px;font-weight:700;margin-top:8px;border:none}

  /* Transfer panel */
  .transfer-panel{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:14px}
  .transfer-title{font-weight:700;font-size:14px;margin-bottom:14px}
  .transfer-subtitle{font-weight:600;font-size:13px;color:#94a3b8;margin-bottom:8px}
  .transfer-divider{height:1px;background:#1e293b;margin:16px 0}
  .code-area{width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px;color:#22c55e;font-size:11px;font-family:monospace;height:80px;resize:none;outline:none}
  .full-btn{width:100%;border-radius:10px;font-weight:700;font-size:14px;padding:14px;border:none;margin-bottom:8px}

  /* Tip banner */
  .tip-banner{background:#14532d;border:1px solid #22c55e;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:14px;color:#86efac}

  /* Error */
  .error-msg{color:#ef4444;font-size:13px;margin-bottom:10px}

  /* Hint text */
  .hint{padding:10px 14px;border-bottom:1px solid #1e293b;font-size:12px;color:#64748b}

  /* Empty state */
  .empty{padding:40px;text-align:center;color:#334155}
  .empty .icon{font-size:48px;margin-bottom:10px}
  .empty .title{font-size:15px;color:#475569}
  .empty .sub{font-size:13px;margin-top:6px}

  /* Snacks tip */
  .snacks-tip{background:#1a0a00;border:1px solid #f97316;border-radius:12px;padding:14px;margin-bottom:14px}
  .snacks-tip h3{font-size:13px;font-weight:700;color:#f97316;margin-bottom:8px}
  .snacks-tip p{font-size:13px;color:#94a3b8;line-height:1.8}

  /* Time edit inline */
  .inline-time{background:#0f172a;border:1px solid #f97316;border-radius:6px;padding:4px 8px;color:#f97316;font-size:11px;font-family:'DM Mono',monospace;outline:none;width:85px}

  /* Meal group header */
  .meal-group-header{padding:8px 14px;background:#111827;font-size:11px;color:#64748b;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1e293b}

  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.3s ease}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="label">Bulk Tracker V1</div>
      <h1>Voeding Dagboek</h1>
    </div>
    <div class="header-right">
      <div class="kcal-display">
        <div class="num" id="kcal-total" style="color:#f97316">0</div>
        <div class="unit">kcal vandaag</div>
      </div>
      <button class="icon-btn" onclick="toggleTransfer()" title="Data overzetten">⇄</button>
    </div>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
</div>

<div class="content">
  <div id="transfer-container"></div>
  <div id="tip-container"></div>

  <!-- Macro overview -->
  <div class="card">
    <div class="card-header">
      <h2>Dagoverzicht</h2>
      <span style="font-size:11px;color:#64748b;font-family:'DM Mono',monospace" id="active-day-label"></span>
    </div>
    <div class="macro-bars" id="macro-bars"></div>
    <div class="summary-grid">
      <div class="summary-box">
        <div class="slabel">Nog nodig</div>
        <div class="sval" id="remaining-kcal" style="color:#f97316">+3100 <span style="font-size:12px;font-weight:400">kcal</span></div>
      </div>
      <div class="summary-box">
        <div class="slabel">Eiwit tekort</div>
        <div class="sval" id="remaining-protein" style="color:#3b82f6">+140 <span style="font-size:12px;font-weight:400">g</span></div>
      </div>
    </div>
  </div>

  <!-- Main tabs -->
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-favs" onclick="switchTab('favs')">⭐ Favorieten</button>
      <button class="tab-btn inactive" id="tab-search" onclick="switchTab('search')">🔍 Zoeken</button>
      <button class="tab-btn inactive" id="tab-log" onclick="switchTab('log')">📋 Log<span id="log-badge" style="display:none;background:#f97316;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px"></span></button>
      <button class="tab-btn inactive" id="tab-checkin" onclick="switchTab('checkin')">💬 Check-in</button>
    </div>
    <div id="tab-content"></div>
  </div>

  <!-- Snacks hint -->
  <div class="snacks-tip" id="snacks-tip" style="display:none">
    <h3>💡 Nog ver van je doel — caloriedichte opties</h3>
    <p>• 30g pindakaas = ~185 kcal, 8g eiwit<br>• Handje noten (30g) = ~180 kcal<br>• 2 eieren = ~150 kcal, 13g eiwit<br>• Koek Mathijs = ~162 kcal</p>
  </div>
</div>

<script>
const GOALS = {
  calories: {min:3100,max:3400,label:'Calorieën',unit:'kcal',color:'#f97316'},
  protein:  {min:140, max:155, label:'Eiwitten', unit:'g',   color:'#3b82f6'},
  fat:      {min:80,  max:120, label:'Vetten',   unit:'g',   color:'#a855f7'},
  carbs:    {min:350, max:450, label:'Koolh.',   unit:'g',   color:'#22c55e'},
  fiber:    {min:30,  max:50,  label:'Vezels',   unit:'g',   color:'#06b6d4'},
  sugar:    {min:0,   max:50,  label:'Suikers',  unit:'g',   color:'#ec4899'},
};

const DEFAULT_FAVS = [
  {id:'fav_havermout', name:'Havermoutpap (70g haver, 70g rozijnen, 4g cacao)', calories:480, protein:12, fat:5.5, carbs:101, fiber:8, sugar:42, emoji:'🥣'},
  {id:'fav_piadina_pb', name:'Piadina met pindakaas (20g)', calories:380, protein:12, fat:16, carbs:46, fiber:2, sugar:3, emoji:'🫓'},
  {id:'fav_piadina_np', name:'Piadina met notenpasta (20g)', calories:375, protein:10, fat:17, carbs:44, fiber:2, sugar:3, emoji:'🫓'},
  {id:'fav_eieren', name:'2 eieren (gebakken)', calories:160, protein:13, fat:11, carbs:1, fiber:0, sugar:0, emoji:'🍳'},
  {id:'fav_kwark', name:'Volle kwark (200g)', calories:130, protein:14, fat:6, carbs:7, fiber:0, sugar:7, emoji:'🥛'},
  {id:'fav_noten', name:'Handje gemengde noten (30g)', calories:185, protein:5, fat:16, carbs:6, fiber:2, sugar:1, emoji:'🥜'},
  {id:'fav_lasagne', name:'Lasagne zelfgemaakt (kwart portie)', calories:1050, protein:54, fat:55, carbs:73, fiber:5, sugar:8, emoji:'🍝'},
  {id:'fav_koek_mathijs', name:'Koek Mathijs (zelfgebakken)', calories:162, protein:5, fat:9, carbs:18, fiber:2, sugar:10, emoji:'🍪'},
];

// State
let allDays = {};
let favorites = [...DEFAULT_FAVS];
let activeDay = getTodayKey();
let activeTab = 'favs';
let showTransfer = false;
let tipTimeout = null;
let preview = null;
let editingTimeId = null;

function getTodayKey() {
  return new Date().toISOString().split('T')[0];
}

function getNow() {
  const d = new Date();
  return d.toTimeString().slice(0,5);
}

function getEntries() { return allDays[activeDay] || []; }

function setEntries(entries) {
  allDays[activeDay] = entries;
  saveData();
}

function getTotals(entries) {
  return entries.reduce((acc,e) => {
    acc.calories += e.calories||0; acc.protein += e.protein||0;
    acc.fat += e.fat||0; acc.carbs += e.carbs||0;
    acc.fiber += e.fiber||0; acc.sugar += e.sugar||0;
    return acc;
  }, {calories:0,protein:0,fat:0,carbs:0,fiber:0,sugar:0});
}

// Storage
function saveData() {
  try { localStorage.setItem('bulk_days', JSON.stringify(allDays)); } catch(e){}
  try { localStorage.setItem('bulk_favs', JSON.stringify(favorites)); } catch(e){}
}

function loadData() {
  try {
    const d = localStorage.getItem('bulk_days');
    if (d) allDays = JSON.parse(d);
  } catch(e){}
  try {
    const f = localStorage.getItem('bulk_favs');
    if (f) {
      const stored = JSON.parse(f);
      const ids = stored.map(x=>x.id);
      favorites = [...stored, ...DEFAULT_FAVS.filter(x=>!ids.includes(x.id))];
    }
  } catch(e){}
}

function showTip(msg, duration=3000) {
  clearTimeout(tipTimeout);
  const c = document.getElementById('tip-container');
  c.innerHTML = `<div class="tip-banner fade-in">${msg}</div>`;
  tipTimeout = setTimeout(() => { c.innerHTML=''; }, duration);
}

// Main render
function render() {
  renderDayTabs();
  renderMacroBars();
  renderTabContent();
  renderTransfer();
  const entries = getEntries();
  const totals = getTotals(entries);
  // Kcal header
  const kcalEl = document.getElementById('kcal-total');
  kcalEl.textContent = Math.round(totals.calories);
  kcalEl.style.color = totals.calories >= GOALS.calories.min ? '#22c55e' : '#f97316';
  // Snacks tip
  document.getElementById('snacks-tip').style.display = totals.calories < 2000 && activeDay === getTodayKey() ? 'block' : 'none';
  // Log badge
  const badge = document.getElementById('log-badge');
  if (entries.length > 0) { badge.style.display='inline'; badge.textContent=entries.length; }
  else badge.style.display='none';
  // Active day label
  document.getElementById('active-day-label').textContent = activeDay;
}

function renderDayTabs() {
  const days = [...new Set([getTodayKey(), ...Object.keys(allDays)])].sort().reverse().slice(0,7);
  const container = document.getElementById('day-tabs');
  container.innerHTML = days.map(day => {
    const label = day === getTodayKey() ? 'Vandaag' : new Date(day).toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
    return `<button class="day-tab ${day===activeDay?'active':'inactive'}" onclick="switchDay('${day}')">${label}</button>`;
  }).join('');
}

function renderMacroBars() {
  const entries = getEntries();
  const totals = getTotals(entries);
  const container = document.getElementById('macro-bars');
  const keys = ['calories','protein','fat','carbs','fiber','sugar'];
  container.innerHTML = keys.map(key => {
    const g = GOALS[key]; const v = totals[key]||0;
    const pct = Math.min((v/g.min)*100,100);
    const over = v > g.max;
    const color = key==='sugar' ? (over?'#ef4444':'#ec4899') : (over?'#ef4444':g.color);
    const valColor = over ? '#ef4444' : v>=g.min ? '#22c55e' : '#e2e8f0';
    const minVal = key==='sugar' ? `max ${g.max}` : `${g.min}–${g.max}`;
    return `<div class="macro-bar">
      <div class="macro-bar-label">
        <span class="name">${g.label}</span>
        <span class="value" style="color:${valColor}">${Math.round(v)} / ${minVal} ${g.unit}</span>
      </div>
      <div class="macro-bar-track"><div class="macro-bar-fill" style="width:${pct}%;background:${color};box-shadow:0 0 8px ${color}88"></div></div>
    </div>`;
  }).join('');

  // Remaining
  const remKcal = GOALS.calories.min - totals.calories;
  const remProt = GOALS.protein.min - totals.protein;
  const kcalEl = document.getElementById('remaining-kcal');
  kcalEl.innerHTML = remKcal>0 ? `+${Math.round(remKcal)} <span style="font-size:12px;font-weight:400">kcal</span>` : `✓ <span style="font-size:12px;font-weight:400">kcal</span>`;
  kcalEl.style.color = remKcal>0?'#f97316':'#22c55e';
  const protEl = document.getElementById('remaining-protein');
  protEl.innerHTML = remProt>0 ? `+${Math.round(remProt)} <span style="font-size:12px;font-weight:400">g</span>` : `✓ <span style="font-size:12px;font-weight:400">g</span>`;
  protEl.style.color = remProt>0?'#3b82f6':'#22c55e';
}

function renderTabContent() {
  const container = document.getElementById('tab-content');
  if (activeTab==='favs') container.innerHTML = renderFavs();
  else if (activeTab==='search') container.innerHTML = renderSearch();
  else if (activeTab==='log') container.innerHTML = renderLog();
  else if (activeTab==='checkin') container.innerHTML = renderCheckin();
}

function chip(value, color, label) {
  return `<div class="chip"><div class="cv" style="color:${color}">${value}</div><div class="cl">${label}</div></div>`;
}

function renderFavs() {
  const hint = `<div class="hint">Tik <strong style="color:#22c55e">＋</strong> om toe te voegen. Sla eigen maaltijden op via Zoeken → ⭐.</div>`;
  const items = favorites.map((fav,i) => {
    const isDefault = DEFAULT_FAVS.find(d=>d.id===fav.id);
    const delBtn = isDefault ? '' : `<button class="del-btn" onclick="removeFav('${fav.id}')">✕</button>`;
    return `<div class="fav-item">
      <div class="fav-emoji">${fav.emoji||'🍽️'}</div>
      <div class="fav-info">
        <div class="fav-name">${fav.name}</div>
        <div class="fav-macros">
          ${chip(Math.round(fav.calories),'#f97316','kcal')}
          ${chip(Math.round(fav.protein)+'g','#3b82f6','eiwit')}
          ${chip(Math.round(fav.fat)+'g','#a855f7','vet')}
          ${chip(Math.round(fav.carbs)+'g','#22c55e','koolh.')}
        </div>
      </div>
      <div class="fav-actions">
        <button class="add-btn" onclick="addFavEntry('${fav.id}')">＋</button>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
  return hint + items;
}

function renderLog() {
  const entries = getEntries();
  if (entries.length === 0) {
    return `<div class="empty"><div class="icon">🍽️</div><div class="title">Nog niets gelogd</div><div class="sub">Gebruik <span style="color:#f97316">Favorieten</span> of <span style="color:#f97316">Zoeken</span></div></div>`;
  }
  // Group by name, preserving order of first occurrence
  const groups = [];
  const seen = {};
  entries.forEach(e => {
    if (seen[e.name] !== undefined) {
      groups[seen[e.name]].ids.push(e.id);
      groups[seen[e.name]].count++;
      // keep latest time
      if (e.time > groups[seen[e.name]].time) groups[seen[e.name]].time = e.time;
    } else {
      seen[e.name] = groups.length;
      groups.push({...e, ids:[e.id], count:1});
    }
  });

  // Sort groups by time
  groups.sort((a,b) => (a.time||'00:00').localeCompare(b.time||'00:00'));

  const rows = groups.map((g,i) => {
    const totalCal = Math.round(g.calories * g.count);
    const totalProt = Math.round(g.protein * g.count);
    const timeDisplay = g.time || '--:--';
    return `<div class="log-entry">
      <div class="log-info">
        <div class="log-time" onclick="editTime('${g.ids[0]}', '${g.name}')">🕐 ${timeDisplay} <span style="font-size:10px;color:#475569">✎</span></div>
        <div class="log-name">${g.name}</div>
        <div class="log-macros">
          <span style="color:#f97316">${totalCal} kcal</span>
          <span style="color:#3b82f6">${totalProt}g eiwit</span>
          ${g.count>1?`<span style="color:#64748b">× ${g.count}</span>`:''}
        </div>
      </div>
      <div class="log-controls">
        <button class="ctrl-btn ctrl-minus" onclick="decrementEntry('${g.name}', '${g.ids[g.ids.length-1]}')">−</button>
        <span class="ctrl-count">${g.count}</span>
        <button class="ctrl-btn ctrl-plus" onclick="incrementEntry('${g.name}')">＋</button>
      </div>
    </div>`;
  }).join('');

  const totals = getTotals(entries);
  const totalRow = `<div class="log-total">
    <span style="font-weight:700;color:#94a3b8">TOTAAL</span>
    <div style="display:flex;gap:10px">
      <span style="color:#f97316;font-weight:700">${Math.round(totals.calories)} kcal</span>
      <span style="color:#3b82f6">${Math.round(totals.protein)}g</span>
      <span style="color:#a855f7;opacity:.7">${Math.round(totals.fat)}g</span>
      <span style="color:#22c55e;opacity:.7">${Math.round(totals.carbs)}g</span>
    </div>
  </div>`;
  return rows + totalRow;
}

  const energyBtns = [1,2,3,4,5].map(n => {

  }).join('');
  const trainingBtns = ['Rust','Licht','Normaal','Zwaar'].map(t => {

    </div>
    <div class="checkin-row">
      <div class="checkin-label">📝 Notitie (optioneel)</div>

function renderTransfer() {
  const container = document.getElementById('transfer-container');
  if (!showTransfer) { container.innerHTML=''; return; }
  container.innerHTML = `<div class="transfer-panel fade-in">
    <div class="transfer-title">⇄ Data overzetten tussen apparaten</div>
    <div class="transfer-subtitle">Stap 1 — Exporteer op dit apparaat</div>
    <button class="full-btn" style="background:#1e293b;color:#e2e8f0" onclick="doExport()">📤 Genereer exportcode</button>
    <div id="export-result"></div>
    <div class="transfer-divider"></div>
    <div class="transfer-subtitle">Stap 2 — Importeer op dit apparaat</div>
    <textarea class="code-area" id="import-input" placeholder="Plak hier de exportcode..." style="color:#e2e8f0"></textarea>
    <button class="full-btn" style="background:#3b82f6;color:#fff;margin-top:8px" onclick="doImport()">📥 Importeer data</button>
    <div id="import-result" style="margin-top:10px;font-size:13px"></div>
  </div>`;
}

// Actions
function switchDay(day) {
  activeDay = day; preview = null; window._searchQuery=''; render();
}

function switchTab(tab) {
  activeTab = tab;
  ['favs','search','log','checkin'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab-btn '+(t===tab?'active':'inactive');
  });
  renderTabContent();
}

function toggleTransfer() {
  showTransfer = !showTransfer; renderTransfer();
}

function addFavEntry(id) {
  const fav = favorites.find(f=>f.id===id);
  if (!fav) return;
  const entries = getEntries();
  entries.push({...fav, id:Date.now(), time:getNow()});
  setEntries(entries);
  checkProteinGoal();
  showTip('✓ Toegevoegd aan log');
  switchTab('log');
}

function incrementEntry(name) {
  const entries = getEntries();
  const base = entries.find(e=>e.name===name);
  if (!base) return;
  entries.push({...base, id:Date.now(), time:getNow()});
  setEntries(entries);
  render();
}

function decrementEntry(name, lastId) {
  let entries = getEntries();
  const idx = entries.findLastIndex ? entries.findLastIndex(e=>e.id===parseInt(lastId)) : [...entries].reverse().findIndex(e=>e.id===parseInt(lastId));
  if (idx >= 0) {
    const realIdx = entries.findLastIndex ? idx : entries.length-1-idx;
    entries.splice(realIdx,1);
  } else {
    const i = entries.findIndex(e=>e.name===name);
    if (i>=0) entries.splice(i,1);
  }
  setEntries(entries);
  render();
}

function editTime(id, name) {
  const entries = getEntries();
  // Find first entry with this name
  const entry = entries.find(e=>e.name===name);
  if (!entry) return;
  const newTime = prompt(`Tijdstip aanpassen voor:\n${name}`, entry.time||getNow());
  if (newTime && /^\d{2}:\d{2}$/.test(newTime)) {
    // Update all entries with this name
    entries.forEach(e => { if(e.name===name) e.time=newTime; });
    setEntries(entries);
    render();
  }
}

function checkProteinGoal() {
  const totals = getTotals(getEntries());
  const prev = getTotals(getEntries().slice(0,-1));
  if (totals.protein >= GOALS.protein.min && prev.protein < GOALS.protein.min) {
    showTip('💪 Eiwitdoel gehaald voor vandaag!', 4000);
  }
}

// Search
function matchFavorite(q) {
  const lower = q.toLowerCase().trim();
  let factor = 1, searchStr = lower;
  if (/\bhalve?\b|0[.,]5/.test(lower)) { factor=0.5; searchStr=searchStr.replace(/halve?|0[.,]5/,'').trim(); }
  else if (/\bkwart\b|0[.,]25/.test(lower)) { factor=0.25; searchStr=searchStr.replace(/kwart|0[.,]25/,'').trim(); }
  else if (/\bdubbel\b|\b2x\b/.test(lower)) { factor=2; searchStr=searchStr.replace(/dubbel|2x/,'').trim(); }
  else { const m=lower.match(/^([0-9]+(?:[.,][0-9]+)?)x\s*/); if(m){factor=parseFloat(m[1].replace(',','.'));searchStr=lower.slice(m[0].length).trim();} }
  const words = searchStr.split(/\s+/).filter(w=>w.length>2);
  if (!words.length) return null;
  let best=null, bestScore=0;
  favorites.forEach(fav => {
    const fl = fav.name.toLowerCase();
    const score = words.filter(w=>fl.includes(w)).length;
    if (score>0 && score>=words.length*0.6 && score>bestScore) { best=fav; bestScore=score; }
  });
  if (!best) return null;
  const label = factor===1?'':factor===0.5?'Halve ':factor===0.25?'Kwart ':`${factor}× `;
  return {
    name:`${label}${best.name}`,
    calories:Math.round(best.calories*factor*10)/10,
    protein:Math.round(best.protein*factor*10)/10,
    fat:Math.round(best.fat*factor*10)/10,
    carbs:Math.round(best.carbs*factor*10)/10,
    fiber:Math.round((best.fiber||0)*factor*10)/10,
    sugar:Math.round((best.sugar||0)*factor*10)/10,
    note:`Berekend op basis van favoriet: ${best.name}`,
    _time: getNow(),
  };
}

async function doSearch() {
  const input = document.getElementById('search-input');
  const q = input ? input.value.trim() : '';
  if (!q) return;
  window._searchQuery = q;
  document.getElementById('search-error').style.display='none';
  // Try favorite match first
  const favMatch = matchFavorite(q);
  if (favMatch) { preview = favMatch; renderTabContent(); return; }
  // AI lookup
  const btn = document.getElementById('search-btn');
  btn.textContent='⏳'; btn.disabled=true;
  try {
    const sys = `Je bent een voedingswaarden-assistent. Geef ALLEEN een JSON-object terug, geen markdown:
{"name":"Naam met hoeveelheid","calories":0,"protein":0,"fat":0,"carbs":0,"fiber":0,"sugar":0,"note":"bron optioneel"}
Schat vezels en suikers zo nauwkeurig mogelijk. Gebruik standaardportie als geen hoeveelheid opgegeven.`;
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:sys,messages:[{role:'user',content:q}]})
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    preview = {...JSON.parse(text.replace(/```json|```/g,'').trim()), _time:getNow()};
    renderTabContent();
  } catch(e) {
    const errEl = document.getElementById('search-error');
    if (errEl) { errEl.textContent='Kon voedingswaarden niet ophalen. Probeer opnieuw.'; errEl.style.display='block'; }
  }
  btn.textContent='🔍'; btn.disabled=false;
}

function clearPreview() { preview=null; renderTabContent(); }

function addPreviewEntry() {
  if (!preview) return;
  const timeEl = document.getElementById('entry-time');
  const time = timeEl ? timeEl.value : getNow();
  const entries = getEntries();
  entries.push({...preview, id:Date.now(), time});
  setEntries(entries);
  checkProteinGoal();
  preview=null; window._searchQuery='';
  switchTab('log');
}

function savePreviewAsFav() {
  if (!preview) return;
  const newFav = {...preview, id:`fav_${Date.now()}`, emoji:'⭐'};
  delete newFav._time;
  favorites.push(newFav);
  saveData();
  showTip('⭐ Opgeslagen als favoriet!');
}

function removeFav(id) {
  favorites = favorites.filter(f=>f.id!==id);
  saveData(); renderTabContent();
}

// Check-in
function setCheckin(field, value) {
  const key = activeDay+'_checkin';
  const checkin = allDays[key]||{};
  checkin[field]=value;
  allDays[key]=checkin;
  saveData(); renderTabContent();
}

function saveCheckin() {
  const key = activeDay+'_checkin';
  const checkin = allDays[key]||{};
  const notesEl = document.getElementById('checkin-notes');
  if (notesEl) checkin.notes = notesEl.value;
  allDays[key]=checkin;
  saveData();
  showTip('✅ Check-in opgeslagen!');
}

// Export / Import
function doExport() {
  const payload = { days: allDays, favs: favorites, version:1 };
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const container = document.getElementById('export-result');
  container.innerHTML = `
    <div style="font-size:11px;color:#64748b;margin-bottom:6px">Kopieer deze code:</div>
    <textarea class="code-area" readonly onclick="this.select()">${code}</textarea>
    <button class="full-btn" style="background:#22c55e;color:#fff;margin-top:6px" onclick="copyCode('${code}')">📋 Kopieer naar klembord</button>`;
}

function copyCode(code) {
  if (navigator.clipboard) navigator.clipboard.writeText(code);
  showTip('📋 Gekopieerd naar klembord!');
}

function doImport() {
  const input = document.getElementById('import-input');
  const result = document.getElementById('import-result');
  try {
    const payload = JSON.parse(decodeURIComponent(escape(atob(input.value.trim()))));
    if (!payload.days || !payload.favs) throw new Error();
    allDays = payload.days;
    const ids = payload.favs.map(f=>f.id);
    favorites = [...payload.favs, ...DEFAULT_FAVS.filter(f=>!ids.includes(f.id))];
    saveData();
    result.textContent='✅ Data succesvol overgezet!'; result.style.color='#22c55e';
    input.value='';
    setTimeout(()=>{ showTransfer=false; render(); },2000);
  } catch(e) {
    result.textContent='❌ Ongeldige code. Kopieer de volledige exportcode.'; result.style.color='#ef4444';
  }
}

// Init
loadData();
render();
</script>
